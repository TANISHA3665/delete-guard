services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      # check_port_connectivity waits until the AMQP listener (5672) actually
      # accepts connections — `ping` only proves the Erlang node is up, which
      # is too early and lets clients hit ECONNREFUSED.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 15

  orders:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile
      args: { SERVICE_DIR: examples/demo/services/orders }
    environment: { AMQP_URL: "amqp://guest:guest@rabbitmq:5672" }
    depends_on:
      rabbitmq: { condition: service_healthy }
    # The demo services open a single AMQP connection at startup with no
    # reconnect; restart so a too-early connection attempt self-heals.
    restart: on-failure
    ports: ["3001:3001"]

  reviews:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile
      args: { SERVICE_DIR: examples/demo/services/reviews }
    environment: { AMQP_URL: "amqp://guest:guest@rabbitmq:5672" }
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: on-failure
    ports: ["3002:3002"]

  customers:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile
      args: { SERVICE_DIR: examples/demo/services/customers }
    environment: { AMQP_URL: "amqp://guest:guest@rabbitmq:5672" }
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: on-failure
    ports: ["3000:3000"]
